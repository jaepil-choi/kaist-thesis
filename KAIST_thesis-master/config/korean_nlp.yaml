# Korean Text Processing Configuration
# Adapted from Hoberg & Phillips (2016) methodology for Korean language

# Tokenizer settings
tokenizer:
  # Backend: kiwipiepy (Korean morphological analyzer)
  # Alternative: konlpy.tag.Mecab (requires separate installation)
  backend: kiwipiepy

  # Kiwipiepy-specific settings
  model_type: knlm  # Korean NLP model
  typos: none      # Typo tolerance: none, basic, auto

# Part-of-speech (POS) tags to keep
# Following H&P 2016: "keep only nouns and proper nouns"
pos_tags:
  - NNG  # Common noun (일반명사): 제품, 시장, 개발
  - NNP  # Proper noun (고유명사): 삼성, 서울, LG
  - NNB  # Dependent noun (의존명사): 것, 수, 등

# Token filtering
filters:
  # Minimum word length in characters
  # Korean words typically 2-4 characters (vs English 3-letter minimum)
  min_word_length: 2

  # Maximum text length to process (for performance optimization)
  # Texts longer than this will be truncated before tokenization
  # Rationale: After ~50k chars, additional text rarely adds distinctive vocabulary
  # H&P methodology focuses on product descriptions (typically <10k chars)
  max_text_length: 50000

  # Remove numeric tokens
  remove_numbers: true

  # Remove single-character tokens (except proper nouns)
  remove_single_char: false

# Korean business stopwords (66 words)
# These are common business/financial terms that appear frequently but don't distinguish products
