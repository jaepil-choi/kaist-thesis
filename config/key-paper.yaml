# Target journal universe for literature search / key-paper selection.
# Used by the paper-search skill (OpenAlex-based, see pyalex).
#
# IMPORTANT — Review of Finance source split:
# OpenAlex indexes this journal under two separate Source records because it
# was renamed from "European Finance Review" (pre-2003) to "Review of Finance".
# Both source_ids must be OR'd together or older articles will be silently
# missing from search results.
#
# id_system: "openalex" — ids below are OpenAlex Source IDs (e.g. "S5353659"),
# NOT Scopus Source IDs. Scopus abstract/reference retrieval was tested and
# returns 401 Unauthorized outside KAIST's institutional network, so this
# project uses OpenAlex (free, no IP restriction) instead of Scopus for
# search + abstract + reference/citation retrieval.
#
# Tier 4 is not an academic prestige ranking like 1-3 -- it's the primary
# practitioner/quant venues for portfolio construction & constrained
# optimization topics (transfer coefficient, active extension / 130-30,
# enhanced indexing, fundamental law of active management). The seminal
# papers for that literature (Grinold 1989; Clarke, de Silva & Thorley 2002)
# live in these two journals, not in the tier 1-3 academic set, so leaving
# tier 4 out would miss the core of that literature. Added 2026-07-12 while
# researching "enhanced index fund performance under constraints / optimal
# long-short alpha transfer" as a candidate thesis topic.

tiers:
  1:
    - name: Journal of Finance
      issn_l: "0022-1082"
      source_ids: ["S5353659"]
    - name: Journal of Financial Economics
      issn_l: "0304-405X"
      source_ids: ["S149240962"]
    - name: Review of Financial Studies
      issn_l: "0893-9454"
      source_ids: ["S170137484"]

